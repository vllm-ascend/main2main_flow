analyze_patch_task:
  description: |
    Current mode: {mode}

    ── fix MODE ─────────────────────────────────────────────────────────────
    There are errors to diagnose. Read each log file in {error_logs} using
    FileReadTool to get the full error details.

    Read {reference_dir}/diagnosis-guide.md — it contains error type → fix
    pattern mappings and step-by-step diagnosis instructions.
    Read {reference_dir}/error-pattern-examples.md for concrete examples.

    For each error, identify:
      - Error type (signature mismatch / import error / version guard / temp file / etc.)
      - Root cause in vllm-ascend
      - Specific fix to apply (file, location, change)

    ── adapt MODE ───────────────────────────────────────────────────────────
    Analyze the upstream vLLM patch for step {step_id}.

    INPUTS:
      - Upstream patch:      {patch_path}
      - Changed files list:  {changed_files_path}
      - vllm-ascend repo:    {ascend_path}
      - Release tag:         {release_tag}

    Read {reference_dir}/adapt-guide.md first — it contains the Key Areas
    table, File Mapping table, and step-by-step instructions (§ Step 1).
    Follow those instructions exactly.

  expected_output: |
    fix mode:
      1. ERRORS ANALYZED: each error with type and root cause.
      2. FIX PLAN: per error, specific file + location + change needed.

    adapt mode:
      1. SUBSYSTEMS TOUCHED: Key Areas affected, with upstream file paths.
      2. CONCRETE CHANGES: exact change type per subsystem.
      3. VLLM-ASCEND FILES AFFECTED: from File Mapping Table, with reason.
      4. CHANGE PLAN: per file, what to change or "no change needed: <why>".
      5. VERSION GUARD ASSESSMENT: YES/NO/N/A per change, release_tag to use.
      6. CONCLUSION: "adaptation needed: [files]" or "no-op: <justification>".
  agent: patch_analyzer

analyze_qa_task:
  description: |
    Current mode: {mode}

    ── fix MODE ─────────────────────────────────────────────────────────────
    Review the diagnosis produced by patch_analyzer for the errors in {error_logs}.
    Read each log file using FileReadTool if you need the raw error details.
    Verify:
      - Every error has been correctly classified (type, root cause)
      - The proposed fix targets the root cause, not just the symptom
      - No error was missed or misdiagnosed

    ── adapt MODE ───────────────────────────────────────────────────────────
    Review the patch analysis produced by patch_analyzer for step {step_id}.
    Verify:
      - All changed upstream files are accounted for
      - The Key Areas classification is correct for each file
      - The File Mapping Table was used — no affected vllm-ascend file was missed
      - Every conclusion ("no change needed") has a valid justification
      - Version guard decisions (YES/NO) are correct

    Read {reference_dir}/adapt-guide.md or {reference_dir}/diagnosis-guide.md
    to cross-check the analysis against the reference tables.
    Read the actual patch at {patch_path} and {changed_files_path} to verify
    claims against the source.

    If the analysis is incorrect or incomplete, reject it and specify exactly
    what is wrong so patch_analyzer can correct it.

  expected_output: |
    APPROVED: the analysis is complete and accurate — summarize what was verified.
    or
    REJECTED: list each specific issue found (missed file, wrong classification,
    unjustified no-op, etc.) so patch_analyzer knows exactly what to fix.
  agent: analyzer_QA

adapt_code_task:
  description: |
    Current mode: {mode}

    ── fix MODE ─────────────────────────────────────────────────────────────
    There are errors to fix. Read each log file in {error_logs} using
    FileReadTool to get the full error details, then fix all issues found.

    Read {reference_dir}/diagnosis-guide.md for error type → fix pattern mapping.
    Read {reference_dir}/error-pattern-examples.md for concrete fix examples.
    Do NOT do vllm upstream adaptation — fix the listed errors only.
    After fixing: git -C {ascend_path} diff HEAD

    ── adapt MODE ───────────────────────────────────────────────────────────
    Apply code adaptations to vllm-ascend for step {step_id} based on the
    analysis from analyze_patch_task.

    INPUTS:
      - Analysis from analyze_patch_task (via context)
      - vllm-ascend repo:   {ascend_path}
      - Release tag:        {release_tag}
      - Upstream patch:     {patch_path}

    Read {reference_dir}/adapt-guide.md (§ Step 2) and
    {reference_dir}/error-pattern-examples.md for fix patterns.
    Follow the guardrails and version guard rules in those files exactly.
    After all adaptations: git -C {ascend_path} diff HEAD

  expected_output: |
    A description of all changes made: which files were modified, what was
    changed in each file, and the output of git -C {ascend_path} diff HEAD.
  agent: code_adapter

review_code_task:
  description: |
    Current mode: {mode}

    Review the code changes produced by code_adapter for step {step_id}.
    Read the git diff and verify each change is correct and complete.

    ── fix MODE ─────────────────────────────────────────────────────────────
    Verify the fixes for errors in {error_logs} are fully resolved.
    Read the log files using FileReadTool if you need the raw error details.
      - Each listed error has a corresponding fix in the diff
      - The fix addresses the root cause, not just the symptom
      - No new issues were introduced

    ── adapt MODE ───────────────────────────────────────────────────────────
    Verify the adaptation matches the analyzer's plan:
      - All files in the change plan were updated
      - No required file was missed (check for other call sites)
      - Method signatures match the upstream change exactly
      - version_is() guards use {release_tag} and have identical signatures
        in all branches
      - No vLLM source files were modified
      - No temp files left in the repo

    Run: git -C {ascend_path} diff HEAD
    Read the changed files in {ascend_path} to verify correctness in context.
    Read {reference_dir}/adapt-guide.md or {reference_dir}/diagnosis-guide.md
    as needed to cross-check the changes against the expected patterns.

  expected_output: |
    modified_files: list of changed vllm-ascend files (empty if no-op).
    is_noop: true only in adapt mode when no code changes were needed.
    step_summary: review verdict — what was verified, any issues found and
      how they were resolved, which files changed, which version guards added.
  agent: code_reviewer
